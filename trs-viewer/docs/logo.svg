<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1f0d"/>
      <stop offset="100%" stop-color="#060e06"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="screenClip">
      <rect x="14" y="12" width="176" height="96" rx="3"/>
    </clipPath>
  </defs>

  <!-- Oscilloscope body shadow -->
  <rect x="7" y="8" width="198" height="108" rx="10" fill="#000" opacity="0.4"/>

  <!-- Oscilloscope body -->
  <rect x="5" y="6" width="198" height="108" rx="10" fill="url(#bodyGrad)" stroke="#555" stroke-width="1.5"/>

  <!-- Screen bezel -->
  <rect x="12" y="10" width="180" height="100" rx="5" fill="#0a0a0a" stroke="#222" stroke-width="1.5"/>

  <!-- Screen face -->
  <rect x="14" y="12" width="176" height="96" rx="3" fill="url(#screenGrad)"/>

  <!-- Grid lines -->
  <g clip-path="url(#screenClip)" stroke="#1a3a1a" stroke-width="0.6" opacity="0.9">
    <line x1="14" y1="36" x2="190" y2="36"/>
    <line x1="14" y1="60" x2="190" y2="60"/>
    <line x1="14" y1="84" x2="190" y2="84"/>
    <line x1="14" y1="60" x2="190" y2="60" stroke="#243a24" stroke-width="1"/>
    <line x1="48" y1="12" x2="48" y2="108"/>
    <line x1="82" y1="12" x2="82" y2="108"/>
    <line x1="116" y1="12" x2="116" y2="108"/>
    <line x1="150" y1="12" x2="150" y2="108"/>
  </g>

  <!-- Threshold line -->
  <line clip-path="url(#screenClip)"
    x1="14" y1="36" x2="190" y2="36"
    stroke="#cc6600" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.85"/>

  <!-- Power trace — flat noise with a clean spike -->
  <polyline clip-path="url(#screenClip)"
    fill="none" stroke="#00ff55" stroke-width="2.2" stroke-linejoin="round" filter="url(#glow)"
    points="
      14,60 20,61 24,59 28,60 32,61 36,60 40,59 44,60
      48,61 52,60 56,59 60,60 64,61 68,60
      72,59 76,60 80,61
      84,60 88,58 90,52 92,40 94,26 95,16
      96,20 97,30 98,42 100,54 102,60
      106,61 110,60 114,59 118,60
      122,61 126,60 130,59 134,60 138,61
      142,60 146,59 150,60 154,61 158,60
      162,59 166,60 170,61 174,60 178,59 182,60 186,61 190,60
    "
  />

  <!-- Right panel: knobs + LED -->
  <circle cx="211" cy="26" r="7" fill="#252525" stroke="#606060" stroke-width="1.5"/>
  <line x1="211" y1="19" x2="211" y2="23" stroke="#999" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="211" cy="52" r="7" fill="#252525" stroke="#606060" stroke-width="1.5"/>
  <line x1="215" y1="48" x2="212" y2="52" stroke="#999" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="211" cy="78" r="7" fill="#252525" stroke="#606060" stroke-width="1.5"/>
  <line x1="207" y1="74" x2="210" y2="78" stroke="#999" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Power LED -->
  <circle cx="211" cy="100" r="5" fill="#00dd44" filter="url(#glow)"/>
  <circle cx="211" cy="100" r="2.5" fill="#aaffcc"/>

  <!-- App name: "trs-viewer" -->
  <text x="238" y="58"
    font-family="'Courier New', Courier, monospace"
    font-size="34"
    font-weight="bold"
    fill="#ffffff"
    letter-spacing="-1">trs</text>

  <text x="238" y="88"
    font-family="'Courier New', Courier, monospace"
    font-size="22"
    font-weight="bold"
    fill="#00ff55"
    letter-spacing="3"
    filter="url(#textglow)">viewer</text>
</svg>
